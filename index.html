<!DOCTYPE html>
<html lang="en">
<head>

  <!-- BASIC META -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO TITLE -->
  <title>
    Safe Delivery | Fast & Secure Parcel Delivery in Liberia
  </title>

  <!-- SEO DESCRIPTION -->
  <meta
    name="description"
    content="Safe Delivery offers fast, secure, and reliable parcel delivery across Liberia. Track your orders in real-time, send packages easily, and enjoy safe doorstep delivery with trusted riders."
  />

  <!-- FONTS -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
<!-- In index.html -->
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&display=swap" rel="stylesheet">
  <!-- THEME COLOR -->
  <meta name="theme-color" content="#1E3A8A" />

  <!-- OPEN GRAPH -->
  <meta property="og:title" content="Safe Delivery" />
  <meta
    property="og:description"
    content="Fast, secure, and reliable delivery service in Liberia. Send parcels with real-time tracking and trusted riders."
  />
  <meta property="og:image" content="/assets/og-image.png" />
  <meta property="og:url" content="https://safedelivery.com" />
  <meta property="og:type" content="website" />

  <!-- TWITTER CARD -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Safe Delivery" />
  <meta
    name="twitter:description"
    content="Send and track parcels easily with Safe Delivery. Fast and secure service across Liberia."
  />
  <meta name="twitter:image" content="/assets/og-image.png" />

  <!-- SEO KEYWORDS -->
  <meta
    name="keywords"
    content="Safe Delivery, parcel delivery Liberia, courier service Monrovia, fast delivery app, rider delivery system, secure parcel service"
  />

  <!-- CANONICAL -->
  <link rel="canonical" href="https://safedelivery.com/" />

  <!-- ROBOTS -->
  <meta name="robots" content="index, follow" />

  <!-- STRUCTURED DATA -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Safe Delivery",
    "url": "https://safedelivery.com/",
    "logo": "https://safedelivery.com/assets/logo.png",
    "description": "Safe Delivery provides fast, secure, and reliable parcel delivery services across Liberia.",
    "contactPoint": {
      "@type": "ContactPoint",
      "contactType": "Customer Support",
      "areaServed": "Liberia"
    }
  }
  </script>

  <!-- VITE + REACT -->
  <script type="module" src="/src/main.jsx"></script>

</head>

<body class="font-[Poppins] bg-white text-gray-800">

  <div id="root"></div>

</body>
</html>
