<!DOCTYPE html>
<html lang="en">
<head>

  <!-- BASIC -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- TITLE -->
  <title>Safe Ride Delivery | Fast & Secure Parcel Delivery</title>

  <!-- SEO META -->
  <meta name="description" content="Safe Ride Delivery provides fast, secure, and reliable parcel delivery. Track orders in real-time with trusted riders." />
  <meta name="keywords" content="delivery app, parcel delivery, courier service, fast delivery, rider app, logistics" />
  <meta name="robots" content="index, follow" />

  <!-- CANONICAL -->
  <link rel="canonical" href="https://saferidedelivery.com/" />

  <!-- FAVICON -->
  <link rel="icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="apple-touch-icon" href="/favicon.png" />

  <!-- PWA -->
  <link rel="manifest" href="/site.webmanifest" />
  <meta name="theme-color" content="#1A6FD4" />

  <!-- GOOGLE FONTS -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- OPEN GRAPH -->
  <meta property="og:title" content="Safe Ride Delivery" />
  <meta property="og:description" content="Fast, secure delivery with real-time tracking." />
  <meta property="og:image" content="https://saferidedelivery.com/assets/og-image.png" />
  <meta property="og:url" content="https://saferidedelivery.com" />
  <meta property="og:type" content="website" />

  <!-- TWITTER -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Safe Ride Delivery" />
  <meta name="twitter:description" content="Send and track parcels easily." />
  <meta name="twitter:image" content="https://saferidedelivery.com/assets/og-image.png" />

  <!-- ========================= -->
  <!-- 🔥 ADVANCED SCHEMA (SEO BOOST) -->
  <!-- ========================= -->

  <!-- ORGANIZATION -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Safe Ride Delivery",
    "url": "https://saferidedelivery.com/",
    "logo": "https://saferidedelivery.com/assets/logo.png",
    "sameAs": [
      "https://facebook.com/",
      "https://instagram.com/"
    ]
  }
  </script>

  <!-- WEBSITE -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Safe Ride Delivery",
    "url": "https://saferidedelivery.com/",
    "potentialAction": {
      "@type": "SearchAction",
      "target": "https://saferidedelivery.com/search?q={search_term_string}",
      "query-input": "required name=search_term_string"
    }
  }
  </script>

  <!-- LOCAL BUSINESS (VERY POWERFUL) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "DeliveryService",
    "name": "Safe Ride Delivery",
    "image": "https://saferidedelivery.com/assets/logo.png",
    "url": "https://saferidedelivery.com/",
    "areaServed": "Global",
    "serviceType": "Parcel Delivery",
    "description": "Fast and secure parcel delivery with real-time tracking.",
    "provider": {
      "@type": "Organization",
      "name": "Safe Ride Delivery"
    }
  }
  </script>

</head>

<body class="bg-white text-gray-800" style="font-family: 'Poppins', sans-serif;">

  <!-- React Root -->
  <div id="root"></div>

  <!-- Vite -->
  <script type="module" src="/src/main.jsx"></script>

</body>
</html>
